name: Publish

on:
    push:
        tags:
            - "v*"

permissions:
    contents: read

env:
    CARGO_INCREMENTAL: 0
    CARGO_TERM_COLOR: "always"
    RUST_LOG: "off"

jobs:
    wasm-build:
        name: Wasm build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
              with:
                  tool: wasm-pack,just
            - name: Build wasm
              run: just build
            - name: Upload
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: build
                  path: pkg

    publish-npm:
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        needs: wasm-build
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
              with:
                  node-version-file: ".node-version"
                  package-manager-cache: false
                  registry-url: "https://registry.npmjs.org"
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: build
                  path: pkg/
            - name: Publish
              working-directory: pkg
              run: npm publish --provenance

    publish-jsr:
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        needs: wasm-build
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
              with:
                  node-version-file: ".node-version"
                  package-manager-cache: false
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: build
                  path: pkg/
            - name: Publish
              working-directory: pkg
              run: npx jsr publish --allow-dirty

    publish-github:
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        needs: wasm-build
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
              with:
                  node-version-file: ".node-version"
                  package-manager-cache: false
                  registry-url: "https://npm.pkg.github.com"
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: build
                  path: pkg/
            - name: Publish
              working-directory: pkg
              run: npm publish
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    publish-github-release:
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        needs: wasm-build
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: build
                  path: pkg/
            - name: Package
              working-directory: pkg
              run: npm pack
            - name: Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  ruff_version="${GITHUB_REF_NAME#v}"
                  {
                      echo "Pinned Ruff version: ${ruff_version}"
                      echo
                      echo "Upstream Ruff release: https://github.com/astral-sh/ruff/releases/tag/${ruff_version}"
                      echo
                      gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
                          -f tag_name="$GITHUB_REF_NAME" \
                          --jq .body
                  } > release-notes.md

                  if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
                      gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
                      gh release upload "$GITHUB_REF_NAME" pkg/*.tgz pkg/*.wasm --clobber
                  else
                      gh release create "$GITHUB_REF_NAME" pkg/*.tgz pkg/*.wasm --verify-tag --title "$GITHUB_REF_NAME" --notes-file release-notes.md
                  fi
